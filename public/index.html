<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grace Unplugged — AI Pastoral Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0d0b; color: #f5f0eb; min-height: 100vh; display: flex; flex-direction: column; }

  .header { background: #1a1410; border-bottom: 1px solid #2e2620; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 36px; height: 36px; background: #EF9F27; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .header-logo svg { width: 20px; height: 20px; }
  .header-title { font-size: 17px; font-weight: 600; color: #f5f0eb; }
  .header-sub { font-size: 12px; color: #a8956e; margin-top: 1px; }
  .header-badge { background: rgba(239,159,39,0.15); color: #EF9F27; font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(239,159,39,0.3); }

  .app-body { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 65px); }

  .sidebar { width: 220px; background: #140f0b; border-right: 1px solid #2e2620; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; overflow-y: auto; }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: #3a2e1e; border-radius: 3px; }
  .sidebar-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #6b5a40; padding: 8px 10px 4px; }
  .sidebar-btn { background: none; border: none; color: #c4aa80; font-size: 13px; padding: 9px 12px; border-radius: 8px; cursor: pointer; text-align: left; width: 100%; display: flex; align-items: center; gap: 10px; transition: background 0.15s; line-height: 1.3; }
  .sidebar-btn:hover { background: rgba(239,159,39,0.08); color: #EF9F27; }
  .sidebar-btn.active { background: rgba(239,159,39,0.12); color: #EF9F27; }
  .sidebar-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .tool-bar { padding: 10px 20px; background: #140f0b; border-bottom: 1px solid #2e2620; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; min-height: 44px; }
  .tool-chip { background: #1e1810; border: 1px solid #3a2e1e; color: #c4aa80; font-size: 12px; padding: 5px 12px; border-radius: 999px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tool-chip:hover { background: rgba(239,159,39,0.12); border-color: rgba(239,159,39,0.4); color: #EF9F27; }

  .messages { flex: 1; overflow-y: auto; padding: 24px 24px 16px; display: flex; flex-direction: column; gap: 18px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #3a2e1e; border-radius: 4px; }

  .msg { display: flex; gap: 12px; max-width: 820px; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .msg-avatar.ai { background: #EF9F27; color: #1a0f00; }
  .msg-avatar.user { background: #3C3489; color: #CECBF6; }
  .msg-bubble { background: #1e1810; border: 1px solid #2e2620; border-radius: 12px; padding: 12px 16px; font-size: 14px; line-height: 1.7; color: #e8dcc8; max-width: 640px; }
  .msg.user .msg-bubble { background: #1e1630; border-color: #302860; color: #d8d0f0; }
  .msg-bubble h3 { font-size: 14px; font-weight: 600; color: #EF9F27; margin: 10px 0 6px; }
  .msg-bubble h3:first-child { margin-top: 0; }
  .msg-bubble ul { padding-left: 18px; margin: 4px 0 8px; }
  .msg-bubble li { margin-bottom: 4px; }
  .msg-bubble strong { color: #f5f0eb; }
  .msg-bubble .section { margin-bottom: 10px; }
  .msg-bubble .section:last-child { margin-bottom: 0; }
  .msg-bubble .tag { display: inline-block; background: rgba(239,159,39,0.12); color: #EF9F27; font-size: 11px; padding: 2px 8px; border-radius: 999px; margin: 2px 2px 6px 0; }
  .msg-bubble .err-detail { display: block; margin-top: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; line-height: 1.5; color: #a8956e; white-space: pre-wrap; word-break: break-word; }
  .msg-bubble .interrupted { display: block; margin-top: 10px; padding-top: 8px; border-top: 1px solid #3a2e1e; font-size: 12px; color: #a8956e; }

  /* Blinking caret while tokens are still arriving. */
  .msg-bubble.streaming .section:last-child::after { content: '▍'; color: #EF9F27; margin-left: 2px; animation: caret 1s steps(1) infinite; }
  @keyframes caret { 50% { opacity: 0; } }

  .typing { display: flex; align-items: center; gap: 5px; padding: 12px 16px; background: #1e1810; border: 1px solid #2e2620; border-radius: 12px; width: fit-content; }
  .typing span { width: 6px; height: 6px; background: #EF9F27; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

  .input-area { padding: 12px 20px 16px; background: #140f0b; border-top: 1px solid #2e2620; flex-shrink: 0; }
  .input-meta { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .clear-btn { background: none; border: 1px solid #2e2620; color: #6b5a40; font-size: 11px; padding: 3px 10px; border-radius: 999px; cursor: pointer; transition: all 0.15s; }
  .clear-btn:hover { border-color: #a8956e; color: #a8956e; }
  .quick-prompts { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .qp-btn { background: #1e1810; border: 1px solid #2e2620; color: #a8956e; font-size: 12px; padding: 5px 11px; border-radius: 999px; cursor: pointer; transition: all 0.15s; }
  .qp-btn:hover { border-color: rgba(239,159,39,0.4); color: #EF9F27; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; background: #1e1810; border: 1px solid #3a2e1e; border-radius: 12px; padding: 10px 14px; }
  .input-row textarea { flex: 1; background: none; border: none; outline: none; color: #f5f0eb; font-size: 14px; font-family: inherit; resize: none; line-height: 1.6; max-height: 120px; min-height: 22px; }
  .input-row textarea::placeholder { color: #6b5a40; }
  .send-btn { background: #EF9F27; border: none; border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
  .send-btn:hover { background: #d4891a; }
  .send-btn:disabled { background: #3a2e1e; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  @media (prefers-reduced-motion: reduce) {
    .typing span, .msg-bubble.streaming .section:last-child::after { animation: none; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M10 2L10 18M6 6L10 2L14 6" stroke="#1a0f00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 12h12" stroke="#1a0f00" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Grace Unplugged</div>
      <div class="header-sub">AI pastoral assistant</div>
    </div>
  </div>
  <div class="header-badge">Powered by Claude</div>
</header>

<div class="app-body">
  <nav class="sidebar">

    <div class="sidebar-label">Preparation</div>
    <button class="sidebar-btn active" onclick="setTool('sermon', this)">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="5" y1="9" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Sermon Builder
    </button>
    <button class="sidebar-btn" onclick="setTool('study', this)">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 5.5V8l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Scripture Study
    </button>
    <button class="sidebar-btn" onclick="setTool('context', this)">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Biblical Context
    </button>
    <button class="sidebar-btn" onclick="setTool('series', this)">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
      Series Planner
    </button>
    <button class="sidebar-btn" onclick="setTool('prayer', this)">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 2C5.79 2 4 3.79 4 6c0 2.5 4 8 4 8s4-5.5 4-8c0-2.21-1.79-4-4-4z" stroke="currentColor" stroke-width="1.5"/></svg>
      Prayer Guide
    </button>
    <button class="sidebar-btn" onclick="setTool('adapt', this)">
      <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Adapt Message
    </button>

    <div class="sidebar-label" style="margin-top:8px;">Ministry</div>
    <button class="sidebar-btn" onclick="setTool('pastoralcare', this)">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 2C5.5 2 3.5 4 3.5 6.5c0 1.5.7 2.8 1.8 3.7L8 14l2.7-3.8c1.1-.9 1.8-2.2 1.8-3.7C12.5 4 10.5 2 8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="8" cy="6.5" r="1.5" stroke="currentColor" stroke-width="1.2"/></svg>
      Pastoral Care
    </button>
    <button class="sidebar-btn" onclick="setTool('marriage', this)">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/><circle cx="10.5" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M1 13c0-2 2-3.5 4.5-3.5S9 11 10 11.5M10 13c0-1 1.5-2 2.5-2s2.5 1 2.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Marriage Mentor
    </button>
    <button class="sidebar-btn" onclick="setTool('biblestudy', this)">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5"/></svg>
      Bible Study
    </button>

    <div class="sidebar-label" style="margin-top:8px;">Reference</div>
    <button class="sidebar-btn" onclick="setTool('commentary', this)">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="8" height="11" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M5 5h4M5 7.5h4M5 10h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 5l2 2-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Bible Commentary
    </button>
    <button class="sidebar-btn" onclick="setTool('dictionary', this)">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="11" cy="10" r="1.5" stroke="currentColor" stroke-width="1"/></svg>
      Bible Dictionary
    </button>
    <button class="sidebar-btn" onclick="setTool('interlinear', this)">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h5M2 8h5M2 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9 4h5M9 8h5M9 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 1"/></svg>
      Interlinear / Concordance
    </button>
    <button class="sidebar-btn" onclick="setTool('comparison', this)">
      <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="6" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="3" width="6" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M7 8h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Bible Comparison
    </button>
    <button class="sidebar-btn" onclick="setTool('tsk', this)">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 4h2.5M6 12h2.5M6 12V4M9 8H6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Cross-References (TSK)
    </button>

    <div class="sidebar-label" style="margin-top:8px;">Media</div>
    <button class="sidebar-btn" onclick="setTool('audiovideo', this)">
      <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="10" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M11 6.5l4-2v7l-4-2V6.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      Audio / Video
    </button>

  </nav>

  <div class="main">
    <div class="tool-bar" id="toolBar"></div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-meta">
        <button class="clear-btn" onclick="clearChat()">Clear conversation</button>
      </div>
      <div class="quick-prompts" id="quickPrompts"></div>
      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="Ask Grace Unplugged anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 16 16" fill="none"><path d="M2 8l12-6-6 12V8H2z" fill="white"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const TOOLS = {
  sermon: {
    label: 'Sermon Builder',
    chips: ['Full sermon outline','Three-point structure','Expository sermon','Topical sermon','Altar call & invitation'],
    prompts: ['Help me build a sermon on John 3:16','Outline a sermon on faith from Hebrews 11','Create a sermon on healing from Isaiah 53'],
    system: `You are Grace Unplugged, an AI pastoral assistant created to serve pastors, preachers, and church leaders. You help build complete, biblically grounded, Spirit-led sermons. You are respectful, warm, scholarly yet accessible, and deeply rooted in Scripture. When building sermons, include: title, key scripture text, introduction, main points with supporting verses, illustrations, application, and a closing invitation or prayer. Format clearly with sections. Always honor the pastor's voice. Use NKJV unless otherwise specified.`
  },
  study: {
    label: 'Scripture Study',
    chips: ['Verse-by-verse','Word study','Cross-references','Original language notes','Practical application'],
    prompts: ['Study Romans 8:28 verse by verse','Unpack the meaning of Psalm 23','Walk through Ephesians 6:10-18'],
    system: `You are Grace Unplugged, an AI Scripture study assistant. Help pastors and teachers do deep verse-by-verse Bible study. Include: original language insights (Hebrew/Greek where helpful), literary context, theological themes, cross-references, and practical application for modern congregations. Be scholarly but accessible. Use NKJV.`
  },
  context: {
    label: 'Biblical Context',
    chips: ['Historical background','Cultural setting','Author & audience','Geography','Parallel passages'],
    prompts: ['What is the historical context of Daniel?','Who was the audience of Galatians?','Explain the cultural background of the Sermon on the Mount'],
    system: `You are Grace Unplugged, an expert in biblical history, culture, and context. Help pastors understand the historical, cultural, geographical, and literary context of Bible passages. Include author, audience, date, cultural setting, and how context changes interpretation.`
  },
  series: {
    label: 'Series Planner',
    chips: ['4-week series','6-week series','Advent series','Marriage series','Prayer series'],
    prompts: ['Plan a 4-week series on the Holy Spirit','Create a 6-week marriage series','Outline an Advent series for December'],
    system: `You are Grace Unplugged, an AI ministry planner. Help pastors design complete sermon and teaching series. For each series provide: series title, theme scripture, week-by-week breakdown with titles and key passages, connecting threads, and suggested application activities or discussion questions.`
  },
  prayer: {
    label: 'Prayer Guide',
    chips: ['Corporate prayer guide','S.O.A.P. prayer','Warfare prayer','Intercessory prayer','Prayer for healing'],
    prompts: ['Create a warfare prayer guide from Ephesians 6','Write a corporate prayer for Sunday service','Build an intercessory prayer guide for the church'],
    system: `You are Grace Unplugged, an AI prayer ministry assistant. Help pastors and prayer leaders craft powerful, scripturally grounded prayer guides. Write in a pastoral, reverent tone. Include scripture references woven naturally into prayer language. Format for corporate or personal use as requested. Use NKJV.`
  },
  adapt: {
    label: 'Adapt Message',
    chips: ["For youth group","For couples","For men's group","For women's ministry","For small group"],
    prompts: ['Adapt this message for a youth group audience','Tailor this sermon for a couples retreat','Rewrite for a small group discussion format'],
    system: `You are Grace Unplugged, an AI message adaptation assistant. Help pastors tailor sermons and teachings for specific audiences — youth, couples, men, women, small groups, leadership teams. Adjust tone, illustrations, language, and applications while preserving the biblical core message.`
  },
  pastoralcare: {
    label: 'Pastoral Care',
    chips: ['Grief & loss','Hospital visit guide','Crisis counseling','Addiction & recovery','Anxiety & fear','Suicidal ideation protocol','Spiritual warfare','Loneliness & isolation','Abuse & trauma','End-of-life care','Letter to a hurting member','Follow-up check-in'],
    prompts: [
      'Help me prepare for a hospital visit with a dying member',
      'Guide me in counseling someone experiencing grief and loss',
      'How do I pastor someone struggling with anxiety and depression?',
      'Help me write a pastoral care letter to a member facing a crisis'
    ],
    system: `You are Grace Unplugged, an AI pastoral care assistant designed to help pastors shepherd their congregation through life's most difficult seasons. You are warm, compassionate, theologically grounded, and Spirit-sensitive. You understand that pastoral care is a sacred trust and you assist — never replace — the pastor's presence, prayer, and wisdom.

GRIEF & BEREAVEMENT: Guide pastors in walking with members through the loss of a loved one. Provide scriptural comfort, suggested visit frameworks, what to say and what not to say, follow-up care timelines, and sample letters or messages of condolence.

HOSPITAL & SICK VISITATION: Offer visit outlines, appropriate scriptures for healing and comfort, short prayers for the bedside, how to engage family members present, and post-visit follow-up suggestions.

CRISIS INTERVENTION: Help pastors respond to sudden trauma — accidents, suicide attempts, family breakdown, job loss, domestic situations. Provide calm, structured response frameworks, de-escalation language, and referral guidance to professional counselors when needed.

MENTAL HEALTH & EMOTIONAL CARE: Assist with counseling members dealing with anxiety, depression, grief, trauma, or burnout. Provide biblically integrated responses that honor both Scripture and the reality of mental health needs. Always encourage professional counseling where appropriate.

ADDICTION & RECOVERY MINISTRY: Help pastors walk alongside members battling substance abuse, pornography, gambling, or other compulsive behaviors. Provide care frameworks, accountability structures, and restoration pathways rooted in grace and truth.

SPIRITUAL CRISIS & DOUBT: Guide pastors in caring for members wrestling with faith, spiritual dryness, unanswered prayer, or theological doubt.

ABUSE & TRAUMA: Assist with trauma-informed pastoral responses. Always prioritize safety of vulnerable individuals. Provide language for difficult conversations and guidance on mandatory reporting and professional referrals.

END-OF-LIFE CARE: Help pastors minister to dying members and their families — what to say, scriptures to read, prayers for peace, and support for those left behind.

WRITTEN PASTORAL CARE: Draft pastoral letters, follow-up messages, check-in notes, condolence cards, and encouragement emails — warm, personal, and spiritually grounding.

SAFETY GUIDELINES: If any situation involves suicidal ideation or intent to harm, always advise the pastor to immediately connect the person to emergency services (911) and a licensed mental health professional. Never provide clinical diagnoses. Always encourage professional counseling. Maintain strict confidentiality.

Format responses with pastoral warmth. Use NKJV scriptures. Honor the dignity of every person.`
  },
  marriage: {
    label: 'Marriage Mentor',
    chips: ['Premarital session','Conflict resolution','Communication tools','Spiritual intimacy','Financial stewardship'],
    prompts: ['Create a premarital session on communication','Build a couples devotional on Ephesians 5','Design a session on conflict and honor'],
    system: `You are Grace Unplugged, an AI marriage mentoring assistant aligned with the Kingdom Marriage ministry framework. Help pastors and mentors create biblically grounded, practically rich marriage mentoring content. Cover communication, spiritual intimacy, conflict resolution, roles, finances, and covenant commitment. Format sessions with objectives, scriptures, discussion questions, and takeaways.`
  },
  biblestudy: {
    label: 'Bible Study',
    chips: ['Connect Group study','Monday Night study','Inductive method','Small group questions','Discussion guide'],
    prompts: ['Create a Connect Group study on John 17','Build a Monday Night Bible Study on prayer','Write a small group discussion guide for Philippians 4'],
    system: `You are Grace Unplugged, an AI Bible study assistant. Help leaders create engaging, theologically sound group Bible studies. Include: passage overview, observation questions, interpretation questions, application questions, and a closing prayer or activity. Format clearly for group facilitation.`
  },
  commentary: {
    label: 'Bible Commentary',
    chips: ['Expository notes','Verse-by-verse commentary','Theological analysis','Cross-references','Preaching insights'],
    prompts: ['Give me commentary on Romans 12:1-2','Provide expository notes on Psalm 91','Commentary on John 1:1-14 for preaching'],
    system: `You are Grace Unplugged, an AI Bible commentary assistant drawing on the rich tradition of evangelical and Reformed biblical scholarship. Provide thorough expository commentary including: literary context, word-level insights from the original Hebrew or Greek, key theological themes, connections to the wider biblical canon, insights from notable commentators (Matthew Henry, Charles Spurgeon, John Calvin, F.F. Bruce, Warren Wiersbe, and others), and practical preaching insights. Format with clear sections: Context, Exposition, Theological Themes, Preaching Notes. Use NKJV as the primary translation.`
  },
  dictionary: {
    label: 'Bible Dictionary',
    chips: ['Define a term','Hebrew word study','Greek word study','Biblical person','Place or location','Theological concept'],
    prompts: ['Define "covenant" in biblical theology','What does the Hebrew word "shalom" mean?','Explain the Greek word "agape" and its usage','Who was Melchizedek in Scripture?'],
    system: `You are Grace Unplugged, an AI Bible dictionary and lexicon assistant. Provide thorough dictionary-style entries including: the original Hebrew or Greek word with transliteration and Strong's number, literal and extended meanings, usage across Scripture with key references, theological significance, and cultural or historical context. For people and places, include their biblical narrative and significance. Format as a clean reference entry with labeled sections.`
  },
  interlinear: {
    label: 'Interlinear / Concordance',
    chips: ["Word-for-word interlinear","Strong's breakdown","All uses in Scripture","Root word analysis","Parsing & grammar","Frequency in Bible"],
    prompts: ['Show me an interlinear breakdown of John 1:1','Give me the Strong\'s analysis of "grace" in Ephesians 2:8','List every use of "ruach" in the Old Testament','Parse the Greek verb in Romans 12:2 — "transformed"'],
    system: `You are Grace Unplugged, an AI interlinear and concordance assistant with deep knowledge of biblical Hebrew and Greek. For interlinear requests: display the verse word-by-word showing the original language word, transliteration, Strong's number, part of speech/parsing, and English gloss — formatted as a clear structured list. For concordance requests: list every significant occurrence of the word across Scripture organized by Testament and book. For root word analysis: trace the root, cognates, and theological development across both Testaments. Always include original script, transliteration, Strong's number, and parsing. Be precise and scholarly.`
  },
  comparison: {
    label: 'Bible Comparison',
    chips: ['Compare 2 translations','Compare 5 translations','KJV vs NKJV','NIV vs ESV','Amplified breakdown','Translation notes'],
    prompts: ['Compare KJV, NKJV, ESV, NIV, and AMP on John 3:16','Show me how different translations render Proverbs 3:5-6','Compare translations of Isaiah 26:3 and note key differences'],
    system: `You are Grace Unplugged, an AI Bible translation comparison assistant. Display how multiple translations render a given verse — including KJV, NKJV, ESV, NIV, NASB, AMP, NLT, and The Message where helpful. Format as a clean stacked comparison with each translation clearly labeled. Then provide analysis noting: key word differences, translation philosophy (formal equivalence vs dynamic), which rendering best captures the original language, and what each version contributes. End with a recommended translation for preaching that passage and why.`
  },
  tsk: {
    label: 'Cross-References (TSK)',
    chips: ['Full TSK cross-refs','Thematic links','Type & antitype','Parallel passages','Prophetic fulfillment','NT quotes OT'],
    prompts: ['Give me TSK cross-references for Psalm 23:1','Find all cross-references for John 14:6','Show the typological connections in Genesis 22','List NT quotations of Isaiah 53'],
    system: `You are Grace Unplugged, an AI cross-reference and typology assistant drawing on the Treasury of Scripture Knowledge (TSK) tradition. For any verse or passage, provide: (1) Direct verbal cross-references; (2) Thematic cross-references; (3) Typological connections — OT types and NT fulfillments; (4) Prophetic fulfillment links; (5) Parallel Gospel passages; (6) NT quotations or allusions to OT texts. Organize by category with brief connection notes. Help the pastor see the unity and depth of God's Word.`
  },
  audiovideo: {
    label: 'Audio / Video',
    chips: ['Sermon script','Podcast outline','Teaching script','Video devotional','Intro & outro','Social media reel'],
    prompts: ['Write a 5-minute video devotional on Philippians 4:13','Create a podcast intro script for Kingdom Marriage','Write a 3-minute social media teaching reel on prayer','Script a full 30-minute audio sermon on Psalm 46'],
    system: `You are Grace Unplugged, an AI audio and video content scripter for ministry media. Create compelling scripts and outlines for sermons, podcast episodes, YouTube devotionals, social media reels, teaching videos, and audio messages. Format for spoken delivery — conversational but authoritative, warm but doctrinally sound. For video scripts: include scene notes, speaker cues, pause points, and on-screen text suggestions. For podcasts: include segment breakdown, talking points, scripture readings, and listener takeaways. For social media reels: write tight 60–90 second scripts with hook, Scripture, teaching point, and call to action. Honor the pastor's voice and Kingdom Marriage ministry brand. Use NKJV unless otherwise specified.`
  }
};

let currentTool = 'sermon';
let isLoading = false;
let conversationHistory = [];

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setTool(tool, btn) {
  currentTool = tool;
  conversationHistory = [];
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderToolBar();
  renderQuickPrompts();
  showWelcome();
}

function renderToolBar() {
  const t = TOOLS[currentTool];
  document.getElementById('toolBar').innerHTML = t.chips.map(c =>
    `<span class="tool-chip" onclick="insertChip(this)">${c}</span>`
  ).join('');
}

function renderQuickPrompts() {
  const t = TOOLS[currentTool];
  document.getElementById('quickPrompts').innerHTML = t.prompts.map(p =>
    `<button class="qp-btn" data-p="${p.replace(/"/g,'&quot;')}" onclick="usePrompt(this)">${p}</button>`
  ).join('');
}

function insertChip(el) {
  const ta = document.getElementById('userInput');
  ta.value = (ta.value ? ta.value + ' ' : '') + el.textContent;
  ta.focus();
  autoResize(ta);
}

function usePrompt(el) {
  document.getElementById('userInput').value = el.dataset.p;
  autoResize(document.getElementById('userInput'));
  sendMessage();
}

function clearChat() {
  conversationHistory = [];
  showWelcome();
}

function showWelcome() {
  const t = TOOLS[currentTool];
  document.getElementById('messages').innerHTML = '';
  addBubble('ai', `
    <h3>Grace Unplugged — ${t.label}</h3>
    <div class="section">Welcome, Pastor Harold. You are in <strong>${t.label}</strong> mode. I am here to help you prepare with depth, clarity, and faithfulness to the Word.</div>
    <div class="section">Use the quick prompts below, click a chip above, or type what you need.</div>
    <div>
      <span class="tag">Scripture-grounded</span>
      <span class="tag">Kingdom Marriage</span>
      <span class="tag">NKJV</span>
    </div>
  `);
}

// Only follow the stream down if the reader hasn't scrolled up to re-read something.
function scrollToBottom(force) {
  const msgs = document.getElementById('messages');
  const nearBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 120;
  if (force || nearBottom) msgs.scrollTop = msgs.scrollHeight;
}

function addBubble(role, html) {
  const msgs = document.getElementById('messages');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg${isUser ? ' user' : ''}`;
  div.innerHTML = `<div class="msg-avatar ${isUser ? 'user' : 'ai'}">${isUser ? 'HD' : 'GU'}</div><div class="msg-bubble">${html}</div>`;
  msgs.appendChild(div);
  scrollToBottom(true);
  return div.querySelector('.msg-bubble');
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar ai">GU</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  scrollToBottom(true);
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function formatResponse(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm, '<h3>$1</h3>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n+/g, '</div><div class="section">')
    .replace(/^/, '<div class="section">')
    .replace(/$/, '</div>');
}

function showError(message, detail) {
  let html = `<strong>Something went wrong.</strong> ${escapeHtml(message)}`;
  if (detail) html += `<span class="err-detail">${escapeHtml(detail)}</span>`;
  addBubble('ai', html);
}

// Turns a chunk of SSE text into events. Anthropic sends `event:` and `data:`
// lines; only the data lines carry the payload we need.
function parseSseLines(buffer, onEvent) {
  let newlineIndex;
  while ((newlineIndex = buffer.indexOf('\n')) !== -1) {
    const line = buffer.slice(0, newlineIndex).trim();
    buffer = buffer.slice(newlineIndex + 1);
    if (!line.startsWith('data:')) continue;
    const payload = line.slice(5).trim();
    if (!payload) continue;
    try {
      onEvent(JSON.parse(payload));
    } catch {
      // A partial JSON payload can't happen here — SSE guarantees whole lines —
      // so anything unparseable is safe to skip.
    }
  }
  return buffer;
}

async function sendMessage() {
  const ta = document.getElementById('userInput');
  const text = ta.value.trim();
  if (!text || isLoading) return;

  ta.value = '';
  autoResize(ta);
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addBubble('user', escapeHtml(text));
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  let bubble = null;
  let reply = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: TOOLS[currentTool].system,
        messages: conversationHistory
      })
    });

    const contentType = res.headers.get('content-type') || '';

    // Anything that isn't an event stream is a failure — read it as text so an
    // HTML error page from a proxy or a 404 shows up legibly instead of
    // blowing up JSON.parse.
    if (!res.ok || !contentType.includes('text/event-stream')) {
      const raw = await res.text();
      let message = null;
      try {
        message = JSON.parse(raw).error;
      } catch { /* not JSON */ }

      removeTyping();
      conversationHistory.pop();

      if (message) {
        showError(message);
      } else if (raw.trim().startsWith('<')) {
        showError(
          `/api/chat returned a web page instead of a response stream (HTTP ${res.status}). The request never reached the edge function.`,
          raw.slice(0, 300)
        );
      } else {
        showError(`The server sent an unreadable response (HTTP ${res.status}).`, raw.slice(0, 300));
      }
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let streamError = null;

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      buffer = parseSseLines(buffer, (evt) => {
        if (evt.type === 'content_block_delta' && evt.delta && evt.delta.type === 'text_delta') {
          if (!bubble) {
            removeTyping();
            bubble = addBubble('ai', '');
            bubble.classList.add('streaming');
          }
          reply += evt.delta.text;
          bubble.innerHTML = formatResponse(reply);
          scrollToBottom();
        } else if (evt.type === 'error') {
          streamError = (evt.error && evt.error.message) || 'The response stream ended with an error.';
        }
      });

      if (streamError) break;
    }

    if (bubble) bubble.classList.remove('streaming');

    if (streamError) throw new Error(streamError);
    if (!reply) throw new Error('The response came back empty.');

    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping();
    if (bubble) bubble.classList.remove('streaming');
    conversationHistory.pop();

    if (reply) {
      // Keep whatever arrived — a half-finished outline still has value — but
      // mark it, since it isn't in the conversation history.
      bubble.innerHTML += `<span class="interrupted">The response was cut off: ${escapeHtml(err.message)} Send the message again to start over.</span>`;
    } else {
      showError(err.message);
    }
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

renderToolBar();
renderQuickPrompts();
showWelcome();
</script>
</body>
</html>
